version: '3.8'

services:
  lms_app:
    image: anshugup/lms:latest
    container_name: lms_app
    ports:
      - "5000:5000"
    restart: always
    environment:
      - DB_USER=LMS
      - DB_PASSWORD=LUCK_123
      - DB_HOST=mysql_db
      - DB_NAME=LMS
    depends_on:
      mysql_db:
        condition: service_healthy

  mysql_db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: LUCK_123
      MYSQL_DATABASE: LMS
      MYSQL_USER: LMS
      MYSQL_PASSWORD: LUCK_123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup

volumes:
  mysql_data:

ports:
  - "80:5000"