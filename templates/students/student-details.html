<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Student Details</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Segoe UI, Arial;
    }

    body {
      background: #eef2f7;
    }

    /* NAVBAR */

    .navbar {
      background: linear-gradient(45deg, #4b6cb7, #182848);
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 40px;
      flex-wrap: wrap;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 35px;
    }

    .nav-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .nav-buttons a {
      text-decoration: none;
      color: white;
      padding: 8px 18px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.15);
      transition: 0.3s;
      font-size: 14px;
    }

    .nav-buttons a:hover {
      background: white;
      color: #182848;
      transform: translateY(-2px);
    }

    /* PAGE TITLE */

    .page-title {
      text-align: center;
      margin: 30px 0;
      color: #333;
      font-size: 28px;
    }

    /* CARD */

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      transition: 0.3s;
    }

    .container:hover {
      transform: translateY(-4px);
    }

    /* PROFILE ICON */

    .profile {
      text-align: center;
      margin-bottom: 20px;
    }

    .profile i {
      font-size: 60px;
      color: #4b6cb7;
      background: #eef2f7;
      padding: 20px;
      border-radius: 50%;
    }

    /* STUDENT INFO */

    .student-info {
      display: grid;
      grid-template-columns: 150px 1fr;
      row-gap: 15px;
      column-gap: 10px;
      font-size: 16px;
    }

    .label {
      font-weight: 600;
      color: #555;
    }

    .value {
      color: #333;
    }

    /* BACK BUTTON */

    .btn-back {
      display: block;
      width: 150px;
      margin: 30px auto 0;
      padding: 12px;
      text-align: center;
      background: linear-gradient(45deg, #4b6cb7, #182848);
      color: white;
      text-decoration: none;
      border-radius: 25px;
      transition: 0.3s;
      font-weight: 500;
    }

    .btn-back:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    /* MOBILE */

    @media(max-width:600px) {

      .student-info {
        grid-template-columns: 1fr;
      }

      .label {
        margin-top: 10px;
      }

      .navbar {
        padding: 15px 20px;
      }

      .page-title {
        font-size: 22px;
      }

    }
  </style>

</head>

<body>

  <!-- NAVBAR -->

  <div class="navbar">

    <div class="logo">
      <img src="https://cdn-icons-png.flaticon.com/512/29/29302.png">
      Library System
    </div>

    <div class="nav-buttons">
      <a href="/"><i class="fa fa-home"></i> Home</a>
      <a href="#"><i class="fa fa-book"></i> Books</a>
      <a href="#"><i class="fa fa-chart-line"></i> Dashboard</a>
    </div>

  </div>

  <h2 class="page-title">Student Details</h2>

  <div class="container">

    <div class="profile">
      <i class="fa-solid fa-user-graduate"></i>
    </div>

    <div class="student-info">

      <div class="label">ID :</div>
      <div class="value">{{student.id}}</div>

      <div class="label">Name :</div>
      <div class="value">{{student.stu_name}}</div>

      <div class="label">Phone :</div>
      <div class="value">{{student.stu_phone}}</div>

      <div class="label">Email :</div>
      <div class="value">{{student.stu_email}}</div>

      <div class="label">Age :</div>
      <div class="value">{{student.stu_age}}</div>

      <div class="label">Address :</div>
      <div class="value">{{student.stu_address}}</div>

    </div>

    <a href="{{url_for('student.all_students_data')}}" class="btn-back">
      <i class="fa fa-arrow-left"></i> Back
    </a>

  </div>

</body>

</html>
