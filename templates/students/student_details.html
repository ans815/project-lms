<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details</title>
</head>
<body>

<center>

<h2>Student Details</h2>

<table border="1" cellpadding="10" style="border-collapse: collapse; width: 50%;">
    
    <tr>
        <th>ID</th>
        <td>{{ student.id }}</td>
    </tr>

    <tr>
        <th>Name</th>
        <td>{{ student.stu_name }}</td>
    </tr>

    <tr>
        <th>Age</th>
        <td>{{ student.stu_age }}</td>
    </tr>

    <tr>
        <th>Email</th>
        <td>{{ student.stu_email }}</td>
    </tr>

    <tr>
        <th>Phone</th>
        <td>{{ student.stu_phone }}</td>
    </tr>

    <tr>
        <th>Address</th>
        <td>{{ student.stu_address }}</td>
    </tr>

</table>

<br>

<a href="{{ url_for('student.all_students_data') }}">
<button>Back to Students</button>
</a>

</center>

</body>
</html>
