<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Author Login</title>
<style>
body { font-family: Arial; background:#f4f6f9; display:flex; justify-content:center; align-items:center; height:100vh;}
.container { width:400px; background:white; padding:30px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
h1{text-align:center; margin-bottom:20px;}
input{width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc;}
button{width:100%; padding:10px; background:#ffc107; color:white; border:none; border-radius:5px; cursor:pointer;}
button:hover{background:#e0a800;}
</style>
</head>
<body>
<div class="container">
<h1>Author Login</h1>
<form method="POST" action="{{ url_for('author.author_login') }}">
    <input type="email" name="email" placeholder="Enter email" required>
    <input type="password" name="password" placeholder="Enter password" required>
    <button type="submit">Login</button>
</form>
<div class="login-link">
    <a href="{{ url_for('author.author_register') }}">Don't have an account? Register</a>
</div>
</div>
</body>
</html>
