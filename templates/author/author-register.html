<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Author Registration</title>
<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background-color:#f4f6f9;
    margin:0;
    padding:0;
}
.container{
    width:400px;
    margin:80px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}
h1{
    text-align:center;
    margin-bottom:20px;
}
label{
    font-weight:bold;
}
input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:5px;
}
button{
    width:100%;
    padding:10px;
    background-color:#ffc107;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background-color:#e0a800;
}
.login-link{
    text-align:center;
    margin-top:15px;
}
</style>
</head>
<body>
<div class="container">

<h1>Author Registration</h1>

<form method="POST" action="{{ url_for('author.author_register') }}">
    {% if message %}
        <p style="color: green; text-align:center;">{{ message }}</p>
    {% endif %}
    <label>Full Name</label>
    <input type="text" name="full_name" placeholder="Enter your full name" required>

    <label>Email</label>
    <input type="email" name="email" placeholder="Enter your email" required>

    <label>Password</label>
    <input type="password" name="password" placeholder="Enter password" required>

    <button type="submit">Register</button>
</form>

<div class="login-link">
Already have an account? <a href="{{ url_for('author.author_login') }}">Login</a>
</div>

</div>
</body>
</html>
