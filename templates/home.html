<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Library Dashboard</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Roboto, Arial;
        }

        body {
            background: linear-gradient(135deg, #eef2f7, #d7e1ec);
            min-height: 100vh;
        }

        /* NAVBAR */

        .navbar {
            background: linear-gradient(45deg, #4b6cb7, #182848);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            width: 35px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
        }

        .nav-buttons a {
            text-decoration: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            transition: .3s;
            font-size: 14px;
        }

        .nav-buttons a:hover {
            background: white;
            color: #182848;
        }

        /* HERO */

        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        .hero h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #2d3436;
        }

        .hero p {
            color: #555;
        }

        /* DASHBOARD GRID */

        .dashboard {

            display: grid;

            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));

            gap: 25px;

            padding: 40px;
        }

        /* CARD */

        .card {

            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);

            padding: 30px;

            border-radius: 16px;

            text-align: center;

            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);

            transition: .3s;
        }

        .card:hover {

            transform: translateY(-6px);

            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.2);

        }

        /* ICON */

        .card i {
            font-size: 30px;
            margin-bottom: 15px;
            color: #4b6cb7;
        }

        /* TITLE */

        .card h3 {
            margin-bottom: 18px;
            color: #333;
        }

        /* BUTTON */

        .card a {

            text-decoration: none;

            padding: 10px 20px;

            border-radius: 8px;

            color: white;

            font-size: 14px;

            display: inline-block;

            transition: .3s;

        }

        /* COLORS */

        .student {
            background: linear-gradient(45deg, #28a745, #1e7e34);
        }

        .author {
            background: linear-gradient(45deg, #17a2b8, #117a8b);
        }

        .book {
            background: linear-gradient(45deg, #007bff, #0056b3);
        }

        .logout {
            background: linear-gradient(45deg, #dc3545, #a71d2a);
        }

        .card a:hover {
            transform: scale(1.05);
        }

        /* FOOTER */

        .footer {
            background: #182848;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            font-size: 14px;
        }

        /* MOBILE */

        @media(max-width:500px) {

            .navbar {
                flex-direction: column;
                gap: 10px;
            }

        }
    </style>

</head>

<body>

    <!-- NAVBAR -->

    <div class="navbar">

        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/29/29302.png">
            Library System
        </div>

        <div class="nav-buttons">
            <a href="/"><i class="fa fa-home"></i> Home</a>
            <a href="#"><i class="fa fa-book"></i> Books</a>
            <a href="#"><i class="fa fa-chart-line"></i> Dashboard</a>
        </div>

    </div>


    <!-- HERO -->

    <div class="hero">

        <h1>📚 Library Management Dashboard</h1>

        <p>Manage Students, Authors and Books easily from one place.</p>

    </div>


    <!-- DASHBOARD -->

    <div class="dashboard">

        <div class="card">
            <i class="fa fa-user-graduate"></i>
            <h3>Student Register</h3>
            <a href="{{url_for('student.student_register')}}" class="student">Register</a>
        </div>

        <div class="card">
            <i class="fa fa-right-to-bracket"></i>
            <h3>Student Login</h3>
            <a href="{{url_for('student.student_login')}}" class="student">Login</a>
        </div>

        <div class="card">
            <i class="fa fa-users"></i>
            <h3>All Students</h3>
            <a href="{{url_for('student.all_students_data')}}" class="book">View</a>
        </div>

        <div class="card">
            <i class="fa fa-user-graduate"></i>
            <h3>Author Register</h3>
            <a href="{{url_for('author.author_register')}}" class="author">Register</a>
        </div>

        <div class="card">
            <i class="fa fa-right-to-bracket"></i>
            <h3>Author Login</h3>
            <a href="{{url_for('author.author_login')}}" class="author">Login</a>
        </div>

        <div class="card">
            <i class="fa fa-users"></i>
            <h3>All Authors</h3>
            <a href="{{url_for('author.all_authors_data')}}" class="book">View</a>
        </div>

    </div>


    <!-- FOOTER -->

    <div class="footer">
        © 2026 Library Management System 🚀
    </div>

</body>

</html>
